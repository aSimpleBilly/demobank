###############################################
# banking-frontend — Deployment
###############################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-frontend
  labels:
    app: banking-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-frontend
  template:
    metadata:
      labels:
        app: banking-frontend
    spec:
      imagePullSecrets:
        - name: harness-registry
      containers:
        - name: banking-frontend
          # Use the Harness registry image from successful build
          image: pkg.harness.io/eerjnxtns4grlg5vnnjzuw/simplebanking/banking-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always

---
###############################################
# banking-frontend — Service (LoadBalancer)
# Creates an AWS ELB to expose the app publicly.
# For internal-only, change type to ClusterIP.
###############################################
apiVersion: v1
kind: Service
metadata:
  name: banking-frontend-svc
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  selector:
    app: banking-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
